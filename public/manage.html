<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Eats">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" href="./icons/icon-192.png">
  <title>Manage · Niche Eats</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .pad-x { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }
  </style>
</head>

<body class="min-h-full bg-slate-950 text-slate-100 antialiased">
  <div class="mx-auto max-w-2xl pad-x pb-16">

    <header class="pt-6 pb-4">
      <a href="./index.html" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back</a>
      <h1 class="mt-2 text-2xl font-semibold tracking-tight">Manage spots</h1>
      <p class="text-sm text-slate-400">
        Adds to the one shared list everyone sees. Include a city or street to pin down the right place.
      </p>
    </header>

    <section class="space-y-3">
      <label for="queries" class="block text-xs font-semibold uppercase tracking-widest text-slate-500">
        Paste names — one per line
      </label>
      <textarea id="queries" rows="6" spellcheck="false"
        placeholder="Franklin Barbecue Austin TX&#10;Veracruz All Natural Cesar Chavez&#10;Spicy Boys East 6th"
        class="w-full rounded-xl border border-slate-800 bg-slate-900/60 p-3 text-sm
               placeholder:text-slate-600 focus:border-slate-600 focus:outline-none"></textarea>

      <div class="flex items-center gap-3">
        <button id="submit"
          class="rounded-full bg-emerald-500 px-4 py-2 text-sm font-medium text-slate-950
                 active:scale-95 transition disabled:opacity-50">
          Add spots
        </button>
        <span id="progress" class="text-sm text-slate-400"></span>
      </div>
    </section>

    <div id="error" class="hidden mt-4 rounded-lg border border-red-900/60 bg-red-950/40 p-3 text-sm text-red-200"></div>

    <section id="results" class="mt-8 space-y-3"></section>
  </div>

  <script type="module" src="./js/manage.js"></script>
</body>
</html>
