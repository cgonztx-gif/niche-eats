<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Eats">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" href="./icons/icon-192.png">
  <title>Manage · Niche Eats</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: '#0a0a0a',
            raised: '#141414',
            pressed: '#1c1c1c',
            line: '#262626',
            'line-strong': '#3d3d3d',
            ink: '#fafafa',
            'ink-soft': '#a3a3a3',
            'ink-mute': '#6b6b6b',
            open: '#22c55e',
            'open-dim': '#16341f',
            closed: '#ef4444',
            'closed-dim': '#3a1a1a',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto',
                   '"Helvetica Neue"', 'Arial', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .pad-x { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      a:active, button:active { transform: none !important; }
    }
  </style>
</head>

<body class="min-h-full bg-base font-sans text-ink antialiased">
  <div class="mx-auto max-w-[560px] pad-x pb-16">

    <header class="pt-6 pb-5">
      <a href="./index.html" class="text-[13px] text-ink-soft transition hover:text-ink">&larr; Back</a>
      <h1 class="mt-2 text-2xl font-semibold tracking-[-0.02em]">Manage spots</h1>
      <p class="mt-0.5 text-[13px] text-ink-soft">
        List is shared between all users.
      </p>
    </header>

    <!-- Reference point: a proximity anchor for adding, NOT the user's location.
         Candidates sort by distance to it and a far match is rejected. -->
    <section class="mb-6 rounded-xl border border-line bg-raised p-3">
      <div class="flex items-baseline justify-between gap-2">
        <span class="text-[11px] font-semibold uppercase tracking-[0.1em] text-ink-mute">Reference point</span>
        <button id="ref-edit" class="text-[12px] text-ink-soft underline underline-offset-2 transition hover:text-ink">Change</button>
      </div>
      <p id="ref-label" class="mt-1 truncate text-sm text-ink">The University of Texas at Austin</p>
      <p class="mt-1 text-[12px] text-ink-mute">Spots you add are sorted by distance from this reference point. This is not your location.</p>
      <div id="ref-editor" class="mt-2 hidden gap-2">
        <input id="ref-input" spellcheck="false" placeholder="Address or place name"
          class="min-w-0 flex-1 rounded-lg border border-line bg-base px-2.5 py-1.5 text-sm text-ink
                 placeholder:text-ink-mute focus:border-line-strong focus:outline-none">
        <button id="ref-set"
          class="shrink-0 rounded-lg border border-line-strong px-3 py-1.5 text-sm text-ink-soft transition
                 active:scale-95 active:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-line-strong">Set</button>
      </div>
    </section>

    <section class="space-y-3">
      <label for="queries" class="block text-[11px] font-semibold uppercase tracking-[0.1em] text-ink-mute">
        Paste names — one per line
      </label>
      <p class="text-[12px] text-ink-mute">Each line should match the name on Google.</p>
      <textarea id="queries" rows="6" spellcheck="false"
        placeholder="Franklin Barbecue Austin TX&#10;Veracruz All Natural Cesar Chavez&#10;Spicy Boys East 6th"
        class="w-full rounded-xl border border-line bg-raised p-3 text-sm text-ink
               placeholder:text-ink-mute focus:border-open focus:outline-none focus:ring-1 focus:ring-open"></textarea>

      <div class="flex items-center gap-3">
        <button id="submit"
          class="rounded-full bg-open px-4 py-2 text-sm font-medium text-base
                 transition active:scale-95 disabled:opacity-40
                 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-line-strong">
          Add spots
        </button>
        <span id="progress" class="text-[13px] tabular-nums text-ink-soft"></span>
      </div>
    </section>

    <div id="error" class="hidden mt-4 rounded-xl border border-closed/50 bg-closed-dim p-3 text-sm text-red-200"></div>

    <section id="results" class="mt-8 space-y-2"></section>

    <section class="mt-10">
      <div class="flex items-baseline justify-between gap-3 border-b border-line pb-2">
        <h2 class="text-[11px] font-semibold uppercase tracking-[0.1em] text-ink-mute">In the list</h2>
        <span id="spot-count" class="text-[11px] tabular-nums text-ink-mute"></span>
      </div>
      <div id="spot-list" class="mt-3 space-y-2"></div>
    </section>
  </div>

  <script type="module" src="./js/manage.js"></script>
</body>
</html>
